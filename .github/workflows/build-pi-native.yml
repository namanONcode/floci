name: Build Pi Native Image

# Builds an ARM aarch64 GraalVM native image for Raspberry Pi 3B+
# and uploads the binary as a downloadable artifact.
#
# Trigger: manual dispatch or push to main that touches source/build files.
# Artifact: floci-pi-native (contains the aarch64 runner binary)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Quarkus profile to bake into the binary (leave empty for default)'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build-pi-native.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native-arm64:
    name: Build aarch64 native image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up GraalVM (Mandrel, JDK 25)
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: |
          PROFILE_ARG=""
          if [[ -n "${{ github.event.inputs.profile }}" ]]; then
            PROFILE_ARG="-Dquarkus.profile=${{ github.event.inputs.profile }}"
          fi
          mvn clean package -Dnative -DskipTests -B $PROFILE_ARG

      - name: Verify binary
        run: |
          file target/*-runner
          ls -lh target/*-runner

      - name: Upload native binary
        uses: actions/upload-artifact@v7
        with:
          name: floci-pi-native
          path: |
            target/*-runner
            target/*.properties
            target/*.so
          if-no-files-found: error
          retention-days: 30
